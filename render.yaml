databases:
  # 1. POSTGRES (Native Managed Database)
  - name: repolens-postgres
    databaseName: repolens
    user: repolens
    plan: free

services:
  # 2. NEO4J (Public Image)
  - type: web
    name: repolens-neo4j
    env: image
    image: 
      url: neo4j:5-community
    plan: free
    envVars:
      - key: NEO4J_AUTH
        value: neo4j/repolens_neo4j
      # Render needs to know which port to listen to for web traffic
      - key: PORT
        value: 7474 

  # 3. CHROMADB (Public Image)
  - type: web
    name: repolens-chromadb
    env: image
    image:
      url: chromadb/chroma:0.6.3
    plan: free
    envVars:
      - key: ANONYMIZED_TELEMETRY
        value: "false"
      - key: PORT
        value: 8000

  # 4. BACKEND
  - type: web
    name: repolens-backend
    env: docker
    plan: free
    rootDir: ./backend
    dockerfilePath: ./Dockerfile
    envVars:
      # Dynamically grab the Postgres connection string
      - key: DATABASE_URL
        fromDatabase:
          name: repolens-postgres
          property: connectionString
      # Point to the internal Render network URLs
      - key: NEO4J_URI
        value: bolt://repolens-neo4j:7687
      - key: NEO4J_USER
        value: neo4j
      - key: NEO4J_PASSWORD
        value: repolens_neo4j
      - key: CHROMA_HOST
        value: repolens-chromadb
      - key: CHROMA_PORT
        value: 8000
      - key: CLONE_DIR
        value: /tmp/repos

  # 5. FRONTEND
  - type: web
    name: repolens-frontend
    env: docker
    plan: free
    rootDir: ./frontend
    dockerfilePath: ./Dockerfile
    # Overriding CMD to force Vite to bind to 0.0.0.0 so Render can see it
    dockerCommand: npm run dev -- --host 
    envVars:
      # Wait for backend to build, then grab its live public URL
      - key: VITE_API_URL
        value: "https://repolens-backend.onrender.com"
        sync: false