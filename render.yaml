databases:
  # 1. POSTGRES (Fully automated native DB, spins up instantly)
  - name: repolens-postgres
    databaseName: repolens
    user: repolens
    plan: free

services:
  # 2. NEO4J (Directly pulls from Docker Hub)
  - type: web
    name: repolens-neo4j
    env: image
    image:
      url: neo4j:5-community
    plan: free
    envVars:
      - key: NEO4J_AUTH
        value: neo4j/repolens_neo4j
      - key: PORT
        value: 7474 

  # 3. CHROMADB (Directly pulls from Docker Hub)
  - type: web
    name: repolens-chromadb
    env: image
    image:
      url: chromadb/chroma:0.6.3
    plan: free
    envVars:
      - key: ANONYMIZED_TELEMETRY
        value: "false"
      - key: PORT
        value: 8000

  # 4. BACKEND (Your pre-built Docker image)
  - type: web
    name: repolens-backend
    env: image
    image:
      url: manveerkaur30052006/repolens-backend:latest
    plan: free
    envVars:
      # Automatically fetches the connection string from the DB above
      - key: DATABASE_URL
        fromDatabase:
          name: repolens-postgres
          property: connectionString
      # Internal network connections to your Dockerized databases
      - key: NEO4J_URI
        value: bolt://repolens-neo4j:7687
      - key: NEO4J_USER
        value: neo4j
      - key: NEO4J_PASSWORD
        value: repolens_neo4j
      - key: CHROMA_HOST
        value: repolens-chromadb
      - key: CHROMA_PORT
        value: 8000
      - key: CLONE_DIR
        value: /tmp/repos

  # 5. FRONTEND (Your pre-built Docker image)
  - type: web
    name: repolens-frontend
    env: image
    image:
      url: manveerkaur30052006/repolens-frontend:latest
    plan: free
    envVars:
      - key: VITE_API_URL
        value: "https://repolens-backend.onrender.com"