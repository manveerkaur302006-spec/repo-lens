version: "3.9"

services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-repolens}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-repolens_secret}
      POSTGRES_DB: ${POSTGRES_DB:-repolens}
    ports:
      - "5432:5432"
    volumes:
      - pg_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U repolens"]
      interval: 5s
      timeout: 5s
      retries: 5

  neo4j:
    image: neo4j:5-community
    environment:
      NEO4J_AUTH: neo4j/${NEO4J_PASSWORD:-repolens_neo4j}
      NEO4J_PLUGINS: '[]'
    ports:
      - "7474:7474"
      - "7687:7687"
    volumes:
      - neo4j_data:/data
    healthcheck:
      test: ["CMD", "neo4j", "status"]
      interval: 10s
      timeout: 10s
      retries: 5

  chromadb:
    image: chromadb/chroma:0.6.3
    ports:
      - "8100:8000"
    volumes:
      - chroma_data:/chroma/chroma
    environment:
      ANONYMIZED_TELEMETRY: "false"

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile

    develop:
      watch:
        - action: sync
          path: ./backend
          target: /app

        - action: rebuild
          path: ./backend/requirements.txt

        - action: rebuild
          path: ./backend/Dockerfile

    ports:
      - "8000:8000"

    env_file:
      - .env

    environment:
      DATABASE_URL: postgresql+asyncpg://${POSTGRES_USER:-repolens}:${POSTGRES_PASSWORD:-repolens_secret}@postgres:5432/${POSTGRES_DB:-repolens}
      NEO4J_URI: bolt://neo4j:7687
      NEO4J_USER: neo4j
      NEO4J_PASSWORD: ${NEO4J_PASSWORD:-repolens_neo4j}
      CHROMA_HOST: chromadb
      CHROMA_PORT: 8000
      CLONE_DIR: /tmp/repos

    volumes:
      - repos_data:/tmp/repos

    depends_on:
      postgres:
        condition: service_healthy
      neo4j:
        condition: service_healthy
      chromadb:
        condition: service_started

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile

    develop:
      watch:
        - action: sync
          path: ./frontend
          target: /app

        - action: rebuild
          path: ./frontend/package.json

        - action: rebuild
          path: ./frontend/package-lock.json

        - action: rebuild
          path: ./frontend/Dockerfile

    ports:
      - "5173:5173"

    environment:
      VITE_API_URL: http://localhost:8000/api

    depends_on:
      - backend

volumes:
  pg_data:
  neo4j_data:
  chroma_data:
  repos_data: